version: 2

sources:
  - name: raw
    database: WEATHER_ANALYTICS
    schema: RAW
    tables:
      - name: WEATHER_OBSERVATIONS
        description: "Raw weather API responses loaded from JSON files in AWS S3."
        config:
          loaded_at_field: loaded_at
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 72
              period: hour
