version: 2

models:
  - name: mart_daily_weather_summary
    description: "Daily weather summary mart by city for reporting and dashboarding."

    columns:
      - name: city
        description: "City name."
        data_tests:
          - not_null

      - name: country
        description: "Country name."
        data_tests:
          - not_null

      - name: observation_date
        description: "Date of the weather observations."
        data_tests:
          - not_null

      - name: total_hourly_records
        description: "Number of hourly records available for the city and date."
        data_tests:
          - not_null

      - name: avg_temperature_2m
        description: "Average daily temperature."
        data_tests:
          - not_null

      - name: min_temperature_2m
        description: "Minimum daily temperature."
        data_tests:
          - not_null

      - name: max_temperature_2m
        description: "Maximum daily temperature."
        data_tests:
          - not_null

      - name: avg_relative_humidity_2m
        description: "Average daily relative humidity."
        data_tests:
          - not_null

      - name: total_precipitation
        description: "Total daily precipitation."
        data_tests:
          - not_null

      - name: avg_wind_speed_10m
        description: "Average daily wind speed."
        data_tests:
          - not_null
